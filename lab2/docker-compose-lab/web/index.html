<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Docker Compose Lab — Frontend</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; }
    #status { font-size: 1.2em; margin-top: 1em; color: #555; }
    button { padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Three-Tier App — Web Frontend</h1>
  <p>Click the button to check the API status.</p>
  <button onclick="checkApi()">Ping API</button>
  <div id="status">—</div>

  <script>
    async function checkApi() {
      const el = document.getElementById('status');
      try {
        const res = await fetch('http://localhost:8080/');
        const data = await res.json();
        el.textContent = JSON.stringify(data);
        el.style.color = 'green';
      } catch (e) {
        el.textContent = 'Error: ' + e.message;
        el.style.color = 'red';
      }
    }
  </script>
</body>
</html>
